services:
  postgres:
    image: postgres:15-alpine
    container_name: fakabot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fakabot
      POSTGRES_USER: fakabot
      POSTGRES_PASSWORD: fakabot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fakabot_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fakabot -d fakabot"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  redis:
    image: redis:7-alpine
    container_name: fakabot-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - fakabot_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  app:
    build: .
    container_name: fakabot
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      # 时区固定；其余配置（DATABASE_URL / REDIS_URL / 密钥 / Worker 间隔等）
      # 统一从 .env 读取，缺失时回退到 app/config.py 的默认值。
      - TZ=Asia/Shanghai
    # 以 root 运行，便于写入宿主挂载的 ./storage 卷
    user: "0:0"
    ports:
      - "127.0.0.1:58001:58001"
    volumes:
      - ./storage:/app/storage
    networks:
      - fakabot_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; sys.exit(0 if b\"ok\" in urllib.request.urlopen(\"http://127.0.0.1:58001/ready\", timeout=3).read() else 1)'"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    stop_grace_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  usdt_scanner:
    build: .
    container_name: fakabot-usdt-scanner
    restart: unless-stopped
    profiles:
      - multi-bot
    command: ["python", "usdt_tron_scanner.py"]
    environment:
      - TZ=Asia/Shanghai
    user: "0:0"
    volumes:
      - ./config.json:/app/config.json:ro
      - usdt_chain_data:/shared
    networks:
      - fakabot_network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  fakabot_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  usdt_chain_data:
    driver: local
